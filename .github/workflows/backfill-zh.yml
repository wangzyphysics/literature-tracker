name: Backfill zh fields (one-shot)

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Backfill scope: all_missing / fallback_english_only / site_latest_and_fallback"
        required: false
        default: "site_latest_and_fallback"
      batch_size:
        description: "LLM batch size per request"
        required: false
        default: "8"
      max_passes:
        description: "Max passes over dataset (retry remaining missing)"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: "backfill-zh"
  cancel-in-progress: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill (zh)
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          OPENROUTER_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_WAIT_MAX_SECONDS: "600"
          AI_WAIT_BASE_SECONDS: "10"
          AI_WAIT_MAX_SLEEP_SECONDS: "60"
          BACKFILL_SCOPE: ${{ inputs.scope }}
          AI_ZH_BATCH_SIZE: ${{ inputs.batch_size }}
          AI_ZH_MAX_PASSES: ${{ inputs.max_passes }}
        run: |
          python backfill_zh.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "🔁 Backfill zh fields"
          # race-safe push: rebase onto moved origin/main and retry (parallel workflows push to main)
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main || { git rebase --abort; exit 1; }
            if git push origin main; then echo "pushed on attempt $i"; exit 0; fi
            sleep 5
          done
          echo "push failed after 5 attempts"; exit 1

      - name: Verify completion (fail if still missing)
        run: |
          python - <<'PY'
          import json
          with open("data/index.json","r",encoding="utf-8") as f:
            articles = (json.load(f) or {}).get("articles", []) or []
          missing = 0
          for a in articles:
            if not (a.get("title_zh") or "").strip():
              missing += 1
              continue
            if not (a.get("abstract_zh") or "").strip():
              missing += 1
              continue
          print("missing", missing)
          raise SystemExit(0 if missing == 0 else 1)
          PY
