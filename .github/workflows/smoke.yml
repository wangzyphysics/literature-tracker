name: Smoke Test

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Syntax check (all tracked .py)
        run: |
          git ls-files '*.py' | xargs python -m py_compile

      - name: Run full test suite
        run: |
          python run_tests.py
